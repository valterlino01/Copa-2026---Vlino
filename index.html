// PONTUAÇÃO
// ══════════════════════════════════════════════════════
function calcScore(guess, actual) {
  if (!actual || actual.homeScore === null || actual.awayScore === null) return null;
  if (guess.homeScore === null || guess.awayScore === null) return 0;
  const gH = parseInt(guess.homeScore), gA = parseInt(guess.awayScore);
  const aH = parseInt(actual.homeScore), aA = parseInt(actual.awayScore);
  const gWinner = gH > gA ? 'home' : gH < gA ? 'away' : 'draw';
  const aWinner = aH > aA ? 'home' : aH < aA ? 'away' : 'draw';
  const exactHome = gH === aH, exactAway = gA === aA;
  const exactBoth = exactHome && exactAway;
  const correctWinner = gWinner === aWinner;

  if (aWinner === 'draw') {
    if (exactBoth) return { points: 5, label: "Placar exato (empate)" };
    if (correctWinner) return { points: 3, label: "Acertou empate" };
    return { points: 0, label: "Errou" };
  }
  // jogo com vencedor
  if (exactBoth) return { points: 5, label: "Placar exato completo!" };
  if (correctWinner && (exactHome || exactAway)) return { points: 3, label: "Vencedor + 1 placar" };
  if (correctWinner) return { points: 2, label: "Acertou vencedor" };
  if (exactHome || exactAway) return { points: 1, label: "1 placar correto" };
  return { points: 0, label: "Errou" };
}

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function getMatchDateTime(m) {
  const [h, min] = m.time.split(":").map(Number);
  const d = new Date(m.date + "T00:00:00-03:00");
  d.setHours(d.getHours() + h);
  d.setMinutes(d.getMinutes() + min);
  return d;
}
// Horário anti-trapaça: usa serverTime do Firestore quando disponível
let serverTimeOffset = 0; // diferença entre hora local e servidor
async function syncServerTime() {
  if (!db) return;
  try {
    const start = Date.now();
    await db.collection("_ping").doc("t").set({ t: firebase.firestore.FieldValue.serverTimestamp() });
    const snap = await db.collection("_ping").doc("t").get();
    const serverMs = snap.data()?.t?.toMillis?.() || Date.now();
    serverTimeOffset = serverMs - ((Date.now() + start) / 2);
  } catch(e) { serverTimeOffset = 0; }
}
function serverNow() { return Date.now() + serverTimeOffset; }
function isLocked(m) {
  return serverNow() >= getMatchDateTime(m).getTime() - 30 * 60000;
}
function minsToLock(m) {
  const diff = getMatchDateTime(m).getTime() - 30*60000 - serverNow();
  return Math.max(0, Math.floor(diff / 60000));
}
function formatDate(ds) {
  const d = new Date(ds + "T12:00:00");
  return d.toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"2-digit"}).replace(".","").toUpperCase();
}
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
}

function RankingTab({ allBets, results, currentUser }) {
  const [detail, setDetail] = useState(null);
  const players = useMemo(() => {
    const map = {};
    Object.entries(allBets).forEach(([user, bets]) => {
      let pts = 0, exact = 0, winner = 0, count = 0;
      SCHEDULE.forEach(m => {
        const r = results[m.id]; const b = bets[m.id];
        if (!r || !b) return;
        const s = calcScore(b, r); if (!s) return;
        pts += s.points; count++;
        if (s.points === 5) exact++;
        else if (s.points >= 2) winner++;
      });
      map[user] = { user, pts, exact, winner, bets, count };
    });
    // Critérios de desempate: 1)pts 2)placares exatos 3)acertos vencedor 4)menos erros 5)alfabético
    return Object.values(map).sort((a,b) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      if (b.exact !== a.exact) return b.exact - a.exact;
      if (b.winner !== a.winner) return b.winner - a.winner;
      const aErros = a.count - a.exact - a.winner;
      const bErros = b.count - b.exact - b.winner;
      if (aErros !== bErros) return aErros - bErros;
      return a.user.localeCompare(b.user);

    <div>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:10}}>
        <button onClick={onFetch} disabled={globalFetching}
          style={{background:globalFetching?"#1e3a5f":"linear-gradient(135deg,#1d4ed8,#059669)",border:"none",borderRadius:6,padding:"6px 14px",color:"#fff",fontSize:"0.75rem",fontWeight:700,letterSpacing:"0.06em",cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontFamily:"'Barlow Condensed',sans-serif"}}>
          <span style={{display:"inline-block",animation:globalFetching?"spin 1s linear infinite":"none"}}>↻</span>
          {globalFetching?"BUSCANDO...":"ATUALIZAR"}
        </button>
      </div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar seleção..."
        style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"7px 12px",color:"#fff",fontSize:"0.85rem",marginBottom:8,outline:"none",fontFamily:"'Barlow Condensed',sans-serif"}}/>
      <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:6}}>
        {PHASES.map(p=>(
          <button key={p} onClick={()=>{setPhase(p);setGroup("Todos");}} style={{padding:"3px 9px",borderRadius:20,border:"none",fontSize:"0.65rem",fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",background:phase===p?(PHASE_COLORS[p]||"#1d4ed8"):"rgba(255,255,255,0.04)",color:phase===p?"#fff":"#94a3b8"}}>{p}</button>
        ))}
      </div>
      {(phase==="Todos"||phase==="Grupos")&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:8}}>
          {GROUPS.map(g=>(
            <button key={g} onClick={()=>setGroup(g)} style={{padding:"2px 8px",borderRadius:20,border:"none",fontSize:"0.62rem",fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",background:group===g?"#f59e0b":"rgba(255,255,255,0.04)",color:group===g?"#000":"#94a3b8"}}>G{g==="Todos"?"✦":g}</button>
          ))}
        </div>
      )}
      {Object.keys(byDate).sort().map(date=>(
        <div key={date} style={{marginBottom:16}}>
          <div style={{background:"linear-gradient(90deg,rgba(30,58,95,0.6),transparent)",borderLeft:"3px solid #1d4ed8",padding:"5px 12px",borderRadius:"4px 4px 0 0",marginBottom:1}}>
            <span style={{fontSize:"0.75rem",fontWeight:800,letterSpacing:"0.12em",color:"#93c5fd"}}>{formatDate(date)}</span>
          </div>
          {byDate[date].map((m,i)=>{
            const r = results[m.id]; const loading = fetchingId===m.id; const ph = PHASE_COLORS[m.phase]||"#3b82f6";
            return (
              <div key={m.id} style={{
                background:m.featured?"linear-gradient(135deg,rgba(250,204,21,0.07),rgba(16,185,129,0.05))":"rgba(255,255,255,0.03)",
                border:`1px solid ${m.featured?"rgba(250,204,21,0.15)":"rgba(255,255,255,0.06)"}`,
                borderLeft:`3px solid ${r?.status==="finished"?"#10b981":r?.status==="live"?"#ef4444":ph}`,
                borderRadius:i===byDate[date].length-1?"0 0 6px 6px":0,marginBottom:1,padding:"9px 12px"
              }}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{minWidth:36,textAlign:"center"}}>
                    <div style={{fontSize:"0.7rem",fontWeight:700,color:"#94a3b8"}}>{m.time}</div>
                    {m.group!=="-"&&<div style={{fontSize:"0.5rem",color:ph,fontWeight:800}}>G{m.group}</div>}
                  </div>
                  <div style={{flex:1,display:"flex",alignItems:"center",gap:4,justifyContent:"flex-end",minWidth:0}}>
                    <span style={{fontSize:"0.78rem",color:"#cbd5e1",textAlign:"right",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.home}</span>
                    <span style={{flexShrink:0}}>{m.homeFlag}</span>
                  </div>
                  <div style={{minWidth:56,textAlign:"center"}}>
                    {r?.status==="finished"||r?.status==="live" ? (
                      <span style={{fontSize:"1.3rem",fontWeight:900,color:r.status==="live"?"#ef4444":"#fff"}}>{r.homeScore}–{r.awayScore}</span>
                    ) : <span style={{fontSize:"0.75rem",color:"#334155",fontWeight:700}}>vs</span>}
                    {r?.status==="live"&&<div style={{fontSize:"0.5rem",color:"#ef4444",fontWeight:800}}>AO VIVO</div>}
                  </div>
                  <div style={{flex:1,display:"flex",alignItems:"center",gap:4,minWidth:0}}>
                    <span style={{flexShrink:0}}>{m.awayFlag}</span>
                    <span style={{fontSize:"0.78rem",color:"#cbd5e1",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.away}</span>
                  </div>
                  <button onClick={()=>onFetch(m)} disabled={loading||globalFetching} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"4px 7px",fontSize:"0.8rem",color:"#94a3b8",cursor:"pointer",flexShrink:0}}>
                    {loading?"⌛":"↻"}
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ══════════════════════════════════════════════════════
// PAINEL ADMIN
// ══════════════════════════════════════════════════════
function AdminPanel({ results, allBets, onSetResult, onClose }) {
  const [sel, setSel] = useState(null);
  const [h, setH] = useState(""); const [a, setA] = useState(""); const [saving, setSaving] = useState(false);
  const [filterPhase, setFilterPhase] = useState("Grupos");
  const upcoming = SCHEDULE.filter(m => m.phase === filterPhase);

  const handleSave = async () => {
    if (!sel || h==="" || a==="") return;
    setSaving(true);
    await onSetResult(sel.id, parseInt(h), parseInt(a));
    setSaving(false); setH(""); setA(""); setSel(null);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:200,overflowY:"auto",padding:16}}>
      <div style={{maxWidth:600,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 style={{color:"#ffd700",fontSize:"1.3rem",fontWeight:900,letterSpacing:"0.06em"}}>👑 PAINEL ADMIN</h2>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:6,padding:"6px 12px",color:"#94a3b8",cursor:"pointer"}}>FECHAR ×</button>
      </div>
      <div style={{background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.2)",borderRadius:8,padding:"8px 14px",marginBottom:12,fontSize:"0.72rem",color:"#f59e0b"}}>
        ⚠️ <strong>Plano gratuito Firebase:</strong> 50.000 leituras/dia · 20.000 escritas/dia · 1GB armazenamento. Monitore em <a href="https://console.firebase.google.com" target="_blank" style={{color:"#ffd700"}}>console.firebase.google.com</a>
      </div>
      <div style={{display:"none"}}><!-- placeholder --></div
        </div>
        {/* Definir resultado */}
        <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:16,marginBottom:16}}>
          <p style={{color:"#93c5fd",fontSize:"0.8rem",fontWeight:700,letterSpacing:"0.06em",marginBottom:10}}>DEFINIR RESULTADO OFICIAL</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}}>
            {["Grupos","2ª Fase","Oitavas","Quartas","Semifinal","Final"].map(p=>(
              <button key={p} onClick={()=>{setFilterPhase(p);setSel(null);}} style={{padding:"3px 10px",borderRadius:20,border:"none",fontSize:"0.65rem",fontWeight:700,cursor:"pointer",background:filterPhase===p?"#1d4ed8":"rgba(255,255,255,0.06)",color:filterPhase===p?"#fff":"#64748b"}}>
                {p}
              </button>
            ))}
          </div>
          <select value={sel?.id||""} onChange={e=>{ const m=SCHEDULE.find(x=>x.id===parseInt(e.target.value)); setSel(m); const r=results[m?.id]; setH(r?.homeScore??""); setA(r?.awayScore??""); }}
            style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8,padding:"8px 10px",color:"#fff",fontSize:"0.85rem",marginBottom:10,outline:"none"}}>
            <option value="">Selecione um jogo...</option>
            {upcoming.map(m=>(
              <option key={m.id} value={m.id}>{m.time} · {m.home} × {m.away} {results[m.id]?.homeScore!==undefined?`(${results[m.id].homeScore}-${results[m.id].awayScore})`:""}</option>
            ))}
          </select>
          {sel && (
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{color:"#fff",flex:1,fontSize:"0.85rem"}}>{sel.homeFlag} {sel.home}</span>
              <input type="number" min="0" max="30" value={h} onChange={e=>setH(e.target.value)} style={{width:44,height:36,textAlign:"center",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:6,color:"#fff",fontSize:"1.1rem",fontWeight:700,outline:"none"}}/>
              <span style={{color:"#475569",fontWeight:700}}>–</span>
              <input type="number" min="0" max="30" value={a} onChange={e=>setA(e.target.value)} style={{width:44,height:36,textAlign:"center",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:6,color:"#fff",fontSize:"1.1rem",fontWeight:700,outline:"none"}}/>
              <span style={{color:"#fff",flex:1,fontSize:"0.85rem",textAlign:"right"}}>{sel.away} {sel.awayFlag}</span>
              <button onClick={handleSave} disabled={saving} style={{background:"#059669",border:"none",borderRadius:6,padding:"8px 14px",color:"#fff",fontSize:"0.8rem",fontWeight:700,cursor:"pointer"}}>
                {saving?"...":"SALVAR"}
              </button>
            </div>
          )}
        </div>
        {/* Todos os palpites por jogo */}
        <p style={{color:"#93c5fd",fontSize:"0.8rem",fontWeight:700,letterSpacing:"0.06em",marginBottom:8}}>PALPITES POR JOGO</p>
        {SCHEDULE.filter(m=>m.phase===filterPhase).map(m => {
          const gameBets = Object.entries(allBets).filter(([,bets])=>bets[m.id]);
          if (!gameBets.length) return null;
          return (
            <div key={m.id} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,padding:"10px 12px",marginBottom:8}}>
              <div style={{fontSize:"0.8rem",fontWeight:700,color:"#fff",marginBottom:6}}>{m.homeFlag} {m.home} × {m.away} {m.awayFlag} <span style={{color:"#64748b",fontWeight:400,fontSize:"0.7rem"}}>{m.date} {m.time}</span></div>
              {gameBets.map(([user,bets])=>{
                const b=bets[m.id]; const r=results[m.id]; const s=r?.homeScore!==undefined?calcScore(b,r):null;
                return (
                  <div key={user} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                    <span style={{fontSize:"0.78rem",color:"#94a3b8"}}>{user}</span>
                    <span style={{fontSize:"0.85rem",fontWeight:700,color:"#fff"}}>{b.homeScore} – {b.awayScore}</span>
                    {s&&<span style={{fontSize:"0.72rem",fontWeight:700,color:s.points>0?"#4ade80":"#475569"}}>{s.points>0?`+${s.points}pts`:"✗"}</span>}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════
// APP PRINCIPAL
// ══════════════════════════════════════════════════════
function App() {
  const [user, setUser] = useState(() => localStorage.getItem("bolao_user_v1") || null);
  const [tab, setTab] = useState("bolao");
  const [bets, setBets] = useState({});
  const [allBets, setAllBets] = useState({});
  const [results, setResults] = useState({});
  const [savingId, setSavingId] = useState(null);
  const [fetchingId, setFetchingId] = useState(null);
  const [globalFetching, setGlobalFetching] = useState(false);
  const [showAdmin, setShowAdmin] = useState(false);
  const [adminInput, setAdminInput] = useState("");
  const [showAdminLogin, setShowAdminLogin] = useState(false);
  const [adminAuth, setAdminAuth] = useState(false);
  const [ticker, setTicker] = useState(0);

  // Sincronizar horário com servidor ao iniciar (anti-trapaça)
  useEffect(() => { syncServerTime(); }, []);
  // Tick a cada minuto para atualizar timers
  useEffect(() => { const t = setInterval(()=>setTicker(x=>x+1),60000); return ()=>clearInterval(t); }, []);

  // Login persistente
  const handleLogin = (name) => { localStorage.setItem("bolao_user_v1",name); setUser(name); };
  const handleLogout = () => { localStorage.removeItem("bolao_user_v1"); setUser(null); setBets({}); };

  // Firebase listeners
  useEffect(() => {
    if (!db || !user) return;
    // Meus palpites
    const unsubBets = db.collection("bets").doc(user).onSnapshot(snap => {
      setBets(snap.exists ? (snap.data()||{}) : {});
    });
    // Resultados
    const unsubResults = db.collection("results").doc("official").onSnapshot(snap => {
      setResults(snap.exists ? (snap.data()||{}) : {});
    });
    // Todos os palpites (para ranking)
    const unsubAll = db.collection("bets").onSnapshot(snap => {
      const map = {}; snap.forEach(d => { map[d.id] = d.data()||{}; }); setAllBets(map);
    });
    return () => { unsubBets(); unsubResults(); unsubAll(); };
  }, [user, db]);

  // Salvar palpite
  const handleSaveBet = useCallback(async (matchId, h, a) => {
    if (!db || !user) return;
    setSavingId(matchId);
    try {
      await db.collection("bets").doc(user).set({ [matchId]: { homeScore: h, awayScore: a, at: new Date().toISOString() } }, { merge: true });
    } catch(e) { console.error(e); }
    setSavingId(null);
  }, [user]);

  // Definir resultado (admin)
  const handleSetResult = useCallback(async (matchId, h, a) => {
    if (!db) return;
    await db.collection("results").doc("official").set({ [matchId]: { homeScore: h, awayScore: a, status: "finished", updatedAt: new Date().toISOString() } }, { merge: true });
  }, []);

  // Buscar resultado via Claude API
  const fetchResult = useCallback(async (match) => {
    if (!match) return;
    setFetchingId(match.id);
    const prompt = `Copa do Mundo 2026: ${match.home} x ${match.away} em ${match.date} às ${match.time} BRT. Busque o resultado. Responda SOMENTE JSON: {"status":"pending"|"finished"|"live","homeScore":número|null,"awayScore":número|null}`;
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:prompt}]})
      });
      const data = await resp.json();
      const txt = data.content?.find(b=>b.type==="text")?.text;
      if (txt) {
        const parsed = JSON.parse(txt.replace(/```json|```/g,"").trim());
        if (parsed.status==="finished"&&parsed.homeScore!==null) {
          await handleSetResult(match.id, parsed.homeScore, parsed.awayScore);
        }
      }
    } catch(e){console.error(e);}
    setFetchingId(null);
  }, [handleSetResult]);

  const fetchAll = useCallback(async () => {
    setGlobalFetching(true);
    const now = Date.now();
    const recent = SCHEDULE.filter(m => {
      const dt = getMatchDateTime(m).getTime();
      return dt < now + 3600000 && dt > now - 172800000;
    });
    for (const m of recent) { await fetchResult(m); }
    setGlobalFetching(false);
  }, [fetchResult]);

  if (!user) return <LoginScreen onLogin={handleLogin}/>;

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0a0f1e,#0d1b2a,#071a0d)",fontFamily:"'Barlow Condensed',Arial Narrow,sans-serif",color:"#e2e8f0"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0f1e}::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px}
        @keyframes spin{to{transform:rotate(360deg)}}
        select option{background:#0d1b2a;color:#fff;}
      `}</style>

      {/* HEADER */}
      <header style={{background:"linear-gradient(180deg,rgba(0,0,0,0.92),rgba(10,15,30,0.96))",borderBottom:"1px solid rgba(255,215,0,0.15)",padding:"10px 16px",position:"sticky",top:0,zIndex:100,backdropFilter:"blur(10px)"}}>
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:"1.5rem"}}>⚽</span>
              <div>
                <div style={{fontSize:"1.1rem",fontWeight:900,letterSpacing:"0.04em",background:"linear-gradient(90deg,#ffd700,#fff,#4ade80)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",lineHeight:1}}>BOLÃO COPA 2026</div>
                <div style={{fontSize:"0.6rem",color:"#64748b",letterSpacing:"0.06em"}}>Olá, {user}!</div>
              </div>
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <button onClick={()=>setShowAdminLogin(true)} style={{background:"rgba(255,215,0,0.08)",border:"1px solid rgba(255,215,0,0.15)",borderRadius:6,padding:"5px 8px",color:"#ffd700",fontSize:"0.7rem",cursor:"pointer"}}>👑</button>
              <button onClick={handleLogout} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"5px 8px",color:"#64748b",fontSize:"0.7rem",cursor:"pointer"}}>Sair</button>
            </div>
          </div>
          {/* Tabs */}
          <div style={{display:"flex",gap:4,marginTop:8}}>
            {[["bolao","🎯 MEU BOLÃO"],["ranking","🏆 RANKING"],["tabela","📋 TABELA"]].map(([v,l])=>(
              <button key={v} onClick={()=>setTab(v)} style={{flex:1,padding:"6px 4px",borderRadius:8,border:"none",fontSize:"0.72rem",fontWeight:700,letterSpacing:"0.04em",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",
                background:tab===v?"#1d4ed8":"rgba(255,255,255,0.05)",color:tab===v?"#fff":"#64748b",
                borderBottom:tab===v?"2px solid #ffd700":"2px solid transparent"}}>{l}</button>
            ))}
          </div>
        </div>
      </header>

      <main style={{maxWidth:700,margin:"0 auto",padding:"14px 12px",paddingBottom:32}}>
        {tab==="bolao"&&<BolaoTab user={user} bets={bets} results={results} onSaveBet={handleSaveBet} savingId={savingId}/>}
        {tab==="ranking"&&<RankingTab allBets={allBets} results={results} currentUser={user}/>}
        {tab==="tabela"&&<TabelaTab results={results} onFetch={(m)=>m?fetchResult(m):fetchAll()} fetchingId={fetchingId} globalFetching={globalFetching}/>}
      </main>

      {/* Admin login modal */}
      {showAdminLogin&&!adminAuth&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:150,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:"#0d1b2a",border:"1px solid rgba(255,215,0,0.2)",borderRadius:12,padding:28,width:"100%",maxWidth:320}}>
            <h3 style={{color:"#ffd700",marginBottom:16,fontSize:"1rem",fontWeight:700}}>👑 Acesso Admin</h3>
            <input type="password" value={adminInput} onChange={e=>setAdminInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(checkAdminPwd(adminInput)?(setAdminAuth(true),setShowAdmin(true),setShowAdminLogin(false)):alert("Senha incorreta"))}
              placeholder="Senha admin..." style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8,padding:"10px 12px",color:"#fff",fontSize:"1rem",outline:"none",marginBottom:10}}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setShowAdminLogin(false)} style={{flex:1,background:"rgba(255,255,255,0.06)",border:"none",borderRadius:8,padding:10,color:"#94a3b8",cursor:"pointer"}}>Cancelar</button>
              <button onClick={()=>{ if(checkAdminPwd(adminInput)){setAdminAuth(true);setShowAdmin(true);setShowAdminLogin(false);}else alert("Senha incorreta");}} style={{flex:1,background:"#1d4ed8",border:"none",borderRadius:8,padding:10,color:"#fff",fontWeight:700,cursor:"pointer"}}>Entrar</button>
            </div>
          </div>
        </div>
      )}

      {/* Admin panel */}
      {showAdmin&&adminAuth&&<AdminPanel results={results} allBets={allBets} onSetResult={handleSetResult} onClose={()=>setShowAdmin(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
